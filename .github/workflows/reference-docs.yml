name: Update Reference Documentation

on:
  schedule:
    - cron: '0 2 * * *' # Nightly at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  update-reference-docs:
    runs-on: ubuntu-latest
    env:
      AUDIT_ACCOUNT: "876912096913"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_MASTER_ACCOUNT }}:role/github-actions-docs
          aws-region: eu-west-1

      # ================================================================
      # STEP 1: Generate AWS Accounts page
      # Source: AWS Organizations API (direct — docs role has read permissions)
      # ================================================================
      - name: Generate AWS Accounts page
        run: |
          mkdir -p /tmp/ref-docs
          TMPDIR=/tmp/ref-docs
          TARGET="content/reference/aws-accounts.md"

          # Fetch all active accounts
          aws organizations list-accounts --output json \
            | jq '[.Accounts[] | select(.Status=="ACTIVE")] | sort_by(.Name | ascii_downcase)' \
            > "$TMPDIR/accounts.json"
          echo "Found $(jq length "$TMPDIR/accounts.json") active accounts"

          # Build OU ID -> Name mapping (top-level OUs)
          ROOT_ID=$(aws organizations list-roots --query 'Roots[0].Id' --output text)
          aws organizations list-organizational-units-for-parent \
            --parent-id "$ROOT_ID" --output json \
            | jq 'reduce .OrganizationalUnits[] as $ou ({}; . + {($ou.Id): $ou.Name})' \
            > "$TMPDIR/ou_map.json"

          # Generate table rows
          : > "$TMPDIR/rows.txt"
          TOTAL_ACCTS=$(jq length "$TMPDIR/accounts.json")
          COUNT=0
          while read -r ACCT_ID; do
            COUNT=$((COUNT + 1))
            ACCT_NAME=$(jq -r --arg id "$ACCT_ID" '.[] | select(.Id==$id) | .Name' "$TMPDIR/accounts.json")
            echo "  [$COUNT/$TOTAL_ACCTS] $ACCT_NAME ($ACCT_ID)"

            # Get resource tags
            TAGS=$(aws organizations list-tags-for-resource --resource-id "$ACCT_ID" --output json 2>/dev/null \
              || echo '{"Tags":[]}')
            CONTACT=$(echo "$TAGS" | jq -r '.Tags | map(select(.Key=="contact")) | .[0].Value // "-"')
            COST_CENTER=$(echo "$TAGS" | jq -r '.Tags | map(select(.Key=="cost_center")) | .[0].Value // "-"')
            ENV_TAG=$(echo "$TAGS" | jq -r '.Tags | map(select(.Key=="env")) | .[0].Value // "-"')

            # Get parent OU
            PARENT_INFO=$(aws organizations list-parents --child-id "$ACCT_ID" --output json 2>/dev/null \
              || echo '{"Parents":[]}')
            PARENT_ID=$(echo "$PARENT_INFO" | jq -r '.Parents[0].Id // ""')
            PARENT_TYPE=$(echo "$PARENT_INFO" | jq -r '.Parents[0].Type // ""')

            if [ "$PARENT_TYPE" = "ORGANIZATIONAL_UNIT" ]; then
              OU_NAME=$(jq -r --arg id "$PARENT_ID" '.[$id] // "-"' "$TMPDIR/ou_map.json")
            else
              OU_NAME="Root"
            fi

            echo "| ${ACCT_NAME} | \`${ACCT_ID}\` | ${OU_NAME} | ${CONTACT} | ${COST_CENTER} | ${ENV_TAG} |" \
              >> "$TMPDIR/rows.txt"
          done < <(jq -r '.[].Id' "$TMPDIR/accounts.json")

          # Build generated content block
          {
            echo "| Account Name | Account ID | OU | Contact | Cost Center | Env |"
            echo "|:-------------|:-----------|:---|:--------|:------------|:----|"
            sort -f -t'|' -k2 "$TMPDIR/rows.txt"
          } > "$TMPDIR/new_content.txt"

          # --- Changelog diffing ---
          EXISTING_CHANGELOG=""
          OLD_IDS=""
          OLD_CONTENT=""
          if [ -f "$TARGET" ]; then
            OLD_CONTENT=$(sed -n '/<!-- BEGIN GENERATED CONTENT -->/,/<!-- END GENERATED CONTENT -->/p' "$TARGET" \
              | sed '1d;$d' || true)
            OLD_IDS=$(echo "$OLD_CONTENT" | grep -oE '[0-9]{12}' | sort -u || true)
            EXISTING_CHANGELOG=$(sed -n '/<!-- BEGIN CHANGELOG -->/,/<!-- END CHANGELOG -->/p' "$TARGET" \
              | sed '1d;$d' || true)
          fi
          NEW_IDS=$(grep -oE '[0-9]{12}' "$TMPDIR/new_content.txt" | sort -u || true)

          CHANGELOG_ENTRY=""
          ADDED=$(comm -13 <(echo "$OLD_IDS") <(echo "$NEW_IDS") | grep -v '^$' || true)
          REMOVED=$(comm -23 <(echo "$OLD_IDS") <(echo "$NEW_IDS") | grep -v '^$' || true)

          if [ -n "$ADDED" ] || [ -n "$REMOVED" ]; then
            CHANGELOG_ENTRY="### $(date -u +%Y-%m-%d)"$'\n'
            while IFS= read -r id; do
              [ -z "$id" ] && continue
              name=$(jq -r --arg id "$id" '.[] | select(.Id==$id) | .Name // "unknown"' "$TMPDIR/accounts.json")
              CHANGELOG_ENTRY+="- Added: ${name} (\`${id}\`)"$'\n'
            done <<< "$ADDED"
            while IFS= read -r id; do
              [ -z "$id" ] && continue
              CHANGELOG_ENTRY+="- Removed: \`${id}\`"$'\n'
            done <<< "$REMOVED"
          elif [ -n "$OLD_CONTENT" ] && [ "$OLD_CONTENT" != "$(cat "$TMPDIR/new_content.txt")" ]; then
            CHANGELOG_ENTRY="### $(date -u +%Y-%m-%d)"$'\n'"- Updated: account tags or metadata changed"$'\n'
          fi

          # --- Write complete file ---
          cat > "$TARGET" <<'FRONTMATTER'
          ---
          title: AWS Accounts
          parent: Reference
          nav_order: 1
          domain: private
          ---

          # AWS Accounts
          {: .no_toc }

          Auto-generated from AWS Organizations API. Updated nightly.
          {: .fs-5 .fw-300 }

          ---

          FRONTMATTER

          {
            echo "<!-- BEGIN GENERATED CONTENT -->"
            cat "$TMPDIR/new_content.txt"
            echo "<!-- END GENERATED CONTENT -->"
            echo ""
            echo "---"
            echo ""
            echo "## Changelog"
            echo "<!-- BEGIN CHANGELOG -->"
            [ -n "$CHANGELOG_ENTRY" ] && printf '%s\n' "$CHANGELOG_ENTRY"
            [ -n "$EXISTING_CHANGELOG" ] && printf '%s\n' "$EXISTING_CHANGELOG"
            echo "<!-- END CHANGELOG -->"
          } >> "$TARGET"

          # Keep accounts.json for TGW cross-referencing, clean up the rest
          rm -f "$TMPDIR/ou_map.json" "$TMPDIR/rows.txt" "$TMPDIR/new_content.txt"
          echo "✅ Accounts page generated"

      # ================================================================
      # STEP 2: Generate Public Endpoints page
      # Source: AWS Config Aggregator (via scoped config-reader role in audit account)
      # ================================================================
      - name: Query Config Aggregator and generate Public Endpoints page
        run: |
          # Assume scoped config-reader role in audit account
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${AUDIT_ACCOUNT}:role/github-actions-docs-config-reader" \
            --role-session-name "ref-docs-endpoints" \
            --output json)
          AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')
          AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r '.Credentials.SecretAccessKey')
          AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r '.Credentials.SessionToken')
          export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN

          # Discover Config Aggregator name
          AGGREGATOR_NAME=$(aws configservice describe-configuration-aggregators \
            --query 'ConfigurationAggregators[0].ConfigurationAggregatorName' \
            --output text)
          echo "Using Config Aggregator: $AGGREGATOR_NAME"
          echo "$AGGREGATOR_NAME" > /tmp/ref-docs/aggregator_name.txt

          # --- Paginated Config query helper ---
          query_config() {
            local expression="$1"
            local all_results="[]"
            local next_token=""

            while true; do
              local args=(
                configservice select-aggregate-resource-config
                --configuration-aggregator-name "$AGGREGATOR_NAME"
                --expression "$expression"
                --limit 100
                --output json
              )
              [ -n "$next_token" ] && args+=(--next-token "$next_token")

              local response
              response=$(aws "${args[@]}") || { echo "Config query failed: $expression" >&2; return 1; }

              local page
              page=$(echo "$response" | jq '[.Results[]? | fromjson]')
              all_results=$(jq -s '.[0] + .[1]' <(echo "$all_results") <(echo "$page"))

              next_token=$(echo "$response" | jq -r '.NextToken // empty')
              [ -z "$next_token" ] && break
            done

            echo "$all_results"
          }

          TMPDIR=/tmp/ref-docs
          TARGET="content/reference/public-endpoints.md"

          # --- Query each resource type ---
          echo "Querying internet-facing load balancers..."
          query_config "SELECT resourceId, accountId, resourceName, configuration.dNSName, configuration.scheme, configuration.type WHERE resourceType = 'AWS::ElasticLoadBalancingV2::LoadBalancer' AND configuration.scheme = 'internet-facing'" \
            > "$TMPDIR/albs.json"

          echo "Querying CloudFront distributions..."
          query_config "SELECT resourceId, accountId, configuration.domainName WHERE resourceType = 'AWS::CloudFront::Distribution'" \
            > "$TMPDIR/cloudfront.json"

          echo "Querying API Gateway REST APIs..."
          query_config "SELECT resourceId, accountId, resourceName WHERE resourceType = 'AWS::ApiGateway::RestApi'" \
            > "$TMPDIR/apigw_rest.json"

          echo "Querying API Gateway V2 HTTP APIs..."
          query_config "SELECT resourceId, accountId, resourceName, configuration.apiEndpoint WHERE resourceType = 'AWS::ApiGatewayV2::Api'" \
            > "$TMPDIR/apigw_v2.json"

          echo "Querying Elastic IPs..."
          query_config "SELECT resourceId, accountId, configuration.publicIp, configuration.instanceId, configuration.networkInterfaceId WHERE resourceType = 'AWS::EC2::EIP'" \
            > "$TMPDIR/eips.json"

          echo "Querying EC2 instances with public IPs..."
          query_config "SELECT resourceId, accountId, resourceName, configuration.publicIpAddress, configuration.instanceType WHERE resourceType = 'AWS::EC2::Instance'" \
            > "$TMPDIR/instances_raw.json"
          jq '[.[] | select(.configuration.publicIpAddress != null and .configuration.publicIpAddress != "")]' \
            "$TMPDIR/instances_raw.json" > "$TMPDIR/instances.json"

          # --- Phase 2 data: routing-chain resources ---
          echo "Querying Internet Gateways..."
          query_config "SELECT resourceId, accountId, configuration WHERE resourceType = 'AWS::EC2::InternetGateway'" \
            > "$TMPDIR/igws.json"

          echo "Querying Route Tables..."
          query_config "SELECT resourceId, accountId, configuration WHERE resourceType = 'AWS::EC2::RouteTable'" \
            > "$TMPDIR/route_tables.json"

          echo "Querying Subnets..."
          query_config "SELECT resourceId, accountId, configuration WHERE resourceType = 'AWS::EC2::Subnet'" \
            > "$TMPDIR/subnets.json"

          echo "Querying Security Groups..."
          query_config "SELECT resourceId, accountId, configuration WHERE resourceType = 'AWS::EC2::SecurityGroup'" \
            > "$TMPDIR/security_groups.json"

          # --- Generate markdown content ---
          {
            # Summary
            ALB_COUNT=$(jq length "$TMPDIR/albs.json")
            CF_COUNT=$(jq length "$TMPDIR/cloudfront.json")
            APIGW_REST_COUNT=$(jq length "$TMPDIR/apigw_rest.json")
            APIGW_V2_COUNT=$(jq length "$TMPDIR/apigw_v2.json")
            EIP_COUNT=$(jq length "$TMPDIR/eips.json")
            INST_COUNT=$(jq length "$TMPDIR/instances.json")
            TOTAL=$((ALB_COUNT + CF_COUNT + APIGW_REST_COUNT + APIGW_V2_COUNT + EIP_COUNT + INST_COUNT))

            echo "**${TOTAL} public-facing resources** discovered across the organization."
            echo ""

            # Load Balancers
            echo "### Load Balancers (internet-facing)"
            echo ""
            if [ "$ALB_COUNT" -gt 0 ]; then
              echo "| Account | Name | Type | DNS Name |"
              echo "|:--------|:-----|:-----|:---------|"
              jq -r 'sort_by(.accountId) | .[] | "| `\(.accountId)` | \(.resourceName // "-") | \(.configuration.type // "-") | \(.configuration.dNSName // "-") |"' \
                "$TMPDIR/albs.json"
            else
              echo "*None found.*"
            fi
            echo ""

            # CloudFront
            echo "### CloudFront Distributions"
            echo ""
            if [ "$CF_COUNT" -gt 0 ]; then
              echo "| Account | Distribution ID | Domain Name |"
              echo "|:--------|:----------------|:------------|"
              jq -r 'sort_by(.accountId) | .[] | "| `\(.accountId)` | \(.resourceId) | \(.configuration.domainName // "-") |"' \
                "$TMPDIR/cloudfront.json"
            else
              echo "*None found.*"
            fi
            echo ""

            # API Gateway REST
            echo "### API Gateway (REST)"
            echo ""
            if [ "$APIGW_REST_COUNT" -gt 0 ]; then
              echo "| Account | API Name | API ID |"
              echo "|:--------|:---------|:-------|"
              jq -r 'sort_by(.accountId) | .[] | "| `\(.accountId)` | \(.resourceName // "-") | \(.resourceId) |"' \
                "$TMPDIR/apigw_rest.json"
            else
              echo "*None found.*"
            fi
            echo ""

            # API Gateway V2
            echo "### API Gateway (HTTP)"
            echo ""
            if [ "$APIGW_V2_COUNT" -gt 0 ]; then
              echo "| Account | API Name | Endpoint |"
              echo "|:--------|:---------|:---------|"
              jq -r 'sort_by(.accountId) | .[] | "| `\(.accountId)` | \(.resourceName // "-") | \(.configuration.apiEndpoint // "-") |"' \
                "$TMPDIR/apigw_v2.json"
            else
              echo "*None found.*"
            fi
            echo ""

            # Elastic IPs
            echo "### Elastic IPs"
            echo ""
            if [ "$EIP_COUNT" -gt 0 ]; then
              echo "| Account | Public IP | Instance | ENI |"
              echo "|:--------|:----------|:---------|:----|"
              jq -r 'sort_by(.accountId) | .[] | "| `\(.accountId)` | \(.configuration.publicIp // "-") | \(.configuration.instanceId // "-") | \(.configuration.networkInterfaceId // "-") |"' \
                "$TMPDIR/eips.json"
            else
              echo "*None found.*"
            fi
            echo ""

            # EC2 Instances
            echo "### EC2 Instances (with public IP)"
            echo ""
            if [ "$INST_COUNT" -gt 0 ]; then
              echo "| Account | Instance ID | Type | Public IP |"
              echo "|:--------|:------------|:-----|:----------|"
              jq -r 'sort_by(.accountId) | .[] | "| `\(.accountId)` | \(.resourceId) | \(.configuration.instanceType // "-") | \(.configuration.publicIpAddress) |"' \
                "$TMPDIR/instances.json"
            else
              echo "*None found.*"
            fi
          } > "$TMPDIR/new_content.txt"

          # --- Build resource fingerprints for changelog diffing ---
          # Extract unique resource keys per type: "TYPE|account|identifier"
          extract_resources() {
            local file="$1" type_label="$2" id_field="$3"
            jq -r --arg t "$type_label" --arg f "$id_field" \
              '.[] | "\($t)|\(.accountId)|\(.[$f] // .resourceId)"' "$file" | sort
          }

          # Build old and new resource lists
          {
            extract_resources "$TMPDIR/albs.json" "ALB" "resourceName"
            extract_resources "$TMPDIR/cloudfront.json" "CloudFront" "resourceId"
            extract_resources "$TMPDIR/apigw_rest.json" "API-GW-REST" "resourceName"
            extract_resources "$TMPDIR/apigw_v2.json" "API-GW-HTTP" "resourceName"
            extract_resources "$TMPDIR/eips.json" "EIP" "configuration.publicIp"
            extract_resources "$TMPDIR/instances.json" "EC2" "resourceId"
          } | sort > "$TMPDIR/new_resources.txt"

          EXISTING_CHANGELOG=""
          : > "$TMPDIR/old_resources.txt"
          if [ -f "$TARGET" ]; then
            EXISTING_CHANGELOG=$(sed -n '/<!-- BEGIN CHANGELOG -->/,/<!-- END CHANGELOG -->/p' "$TARGET" \
              | sed '1d;$d' || true)
            # Extract resource keys from existing markdown tables
            # Table rows look like: | `account` | name | ... |
            # We reconstruct type from section headers
            OLD_CONTENT=$(sed -n '/<!-- BEGIN GENERATED CONTENT -->/,/<!-- END GENERATED CONTENT -->/p' "$TARGET" \
              | sed '1d;$d' || true)
          fi

          NEW_CONTENT=$(cat "$TMPDIR/new_content.txt")
          CHANGELOG_ENTRY=""
          if [ "$OLD_CONTENT" = "$NEW_CONTENT" ] 2>/dev/null; then
            : # No changes
          elif [ -z "$OLD_CONTENT" ] && [ -n "$NEW_CONTENT" ]; then
            TOTAL=$(wc -l < "$TMPDIR/new_resources.txt" | tr -d ' ')
            CHANGELOG_ENTRY="### $(date -u +%Y-%m-%d)"$'\n'
            CHANGELOG_ENTRY+="- Initial scan: ${TOTAL} resources discovered"$'\n'
          else
            # Diff new vs old resource lists from the markdown tables
            # Extract from old content: parse table rows per section
            current_type=""
            while IFS= read -r line; do
              case "$line" in
                "### Load Balancers"*) current_type="ALB" ;;
                "### CloudFront"*) current_type="CloudFront" ;;
                "### API Gateway (REST)"*) current_type="API-GW-REST" ;;
                "### API Gateway (HTTP)"*) current_type="API-GW-HTTP" ;;
                "### Elastic IPs"*) current_type="EIP" ;;
                "### EC2 Instances"*) current_type="EC2" ;;
                "| \`"*)
                  # Parse table row: | `account` | name/id | ... |
                  acct=$(echo "$line" | awk -F'|' '{print $2}' | grep -oE '[0-9]{12}')
                  ident=$(echo "$line" | awk -F'|' '{print $3}' | sed 's/^ *//;s/ *$//')
                  [ -n "$current_type" ] && [ -n "$acct" ] && \
                    echo "${current_type}|${acct}|${ident}"
                  ;;
              esac
            done <<< "$OLD_CONTENT" | sort > "$TMPDIR/old_resources.txt"

            ADDED=$(comm -13 "$TMPDIR/old_resources.txt" "$TMPDIR/new_resources.txt" || true)
            REMOVED=$(comm -23 "$TMPDIR/old_resources.txt" "$TMPDIR/new_resources.txt" || true)

            if [ -n "$ADDED" ] || [ -n "$REMOVED" ]; then
              CHANGELOG_ENTRY="### $(date -u +%Y-%m-%d)"$'\n'
              while IFS='|' read -r rtype acct ident; do
                [ -z "$rtype" ] && continue
                CHANGELOG_ENTRY+="- Added: ${rtype} \`${ident}\` in \`${acct}\`"$'\n'
              done <<< "$ADDED"
              while IFS='|' read -r rtype acct ident; do
                [ -z "$rtype" ] && continue
                CHANGELOG_ENTRY+="- Removed: ${rtype} \`${ident}\` from \`${acct}\`"$'\n'
              done <<< "$REMOVED"
            fi
          fi

          # --- Write complete file ---
          cat > "$TARGET" <<'FRONTMATTER'
          ---
          title: Public Endpoints
          parent: Reference
          nav_order: 2
          domain: private
          ---

          # Public Endpoints
          {: .no_toc }

          Auto-generated from AWS Config Aggregator. Updated nightly.
          {: .fs-5 .fw-300 }

          ---

          FRONTMATTER

          {
            echo "<!-- BEGIN PHASE2 -->"
            echo "*Phase 2 analysis pending...*"
            echo "<!-- END PHASE2 -->"
            echo ""
            echo "---"
            echo ""
            echo "## Resource Inventory (Phase 1)"
            echo ""
            echo "<!-- BEGIN GENERATED CONTENT -->"
            cat "$TMPDIR/new_content.txt"
            echo "<!-- END GENERATED CONTENT -->"
            echo ""
            echo "---"
            echo ""
            echo "## Changelog"
            echo "<!-- BEGIN CHANGELOG -->"
            [ -n "$CHANGELOG_ENTRY" ] && printf '%s\n' "$CHANGELOG_ENTRY"
            [ -n "$EXISTING_CHANGELOG" ] && printf '%s\n' "$EXISTING_CHANGELOG"
            echo "<!-- END CHANGELOG -->"
          } >> "$TARGET"

          echo "✅ Endpoints page generated"

      # ================================================================
      # STEP 2b: Phase 2 — Routing-chain analysis
      # Source: JSON data collected in Step 2
      # ================================================================
      - name: Analyze routing chain (Phase 2)
        run: |
          python3 scripts/analyze-routing-chain.py --data-dir /tmp/ref-docs \
            > /tmp/ref-docs/phase2_output.md

          TARGET="content/reference/public-endpoints.md"
          if [ -s /tmp/ref-docs/phase2_output.md ]; then
            # Inject Phase 2 output between markers
            if grep -q '<!-- BEGIN PHASE2 -->' "$TARGET"; then
              # Replace existing Phase 2 content
              sed -i '/<!-- BEGIN PHASE2 -->/,/<!-- END PHASE2 -->/{//!d}' "$TARGET"
              sed -i '/<!-- BEGIN PHASE2 -->/r /tmp/ref-docs/phase2_output.md' "$TARGET"
            fi
          fi
          echo "✅ Phase 2 analysis complete"

      # ================================================================
      # STEP 2c: Generate TGW Route Tables page
      # Source: EC2 API in network account (via scoped network-reader role)
      # ================================================================
      - name: Generate TGW Route Tables page
        env:
          NETWORK_ACCOUNT: "048261450640"
        run: |
          # Assume scoped network-reader role
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${NETWORK_ACCOUNT}:role/github-actions-docs-network-reader" \
            --role-session-name "ref-docs-tgw" \
            --output json)
          AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')
          AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r '.Credentials.SecretAccessKey')
          AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r '.Credentials.SessionToken')
          export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN

          TMPDIR=/tmp/ref-docs
          TARGET="content/reference/tgw-routes.md"

          # Get all TGWs
          aws ec2 describe-transit-gateways --output json > "$TMPDIR/tgws.json"
          TGW_ID=$(jq -r '.TransitGateways[0].TransitGatewayId' "$TMPDIR/tgws.json")
          echo "TGW: $TGW_ID"

          # Get all attachments
          aws ec2 describe-transit-gateway-attachments \
            --filters "Name=transit-gateway-id,Values=$TGW_ID" \
            --output json > "$TMPDIR/tgw_attachments.json"

          # Get all route tables
          aws ec2 describe-transit-gateway-route-tables \
            --filters "Name=transit-gateway-id,Values=$TGW_ID" \
            --output json > "$TMPDIR/tgw_route_tables.json"

          # Build account ID → name map from Step 1 data
          ACCT_MAP=$(jq -r 'reduce .[] as $a ({}; . + {($a.Id): $a.Name})' "$TMPDIR/accounts.json")

          # Build attachment ID → name/info map
          ATT_MAP=$(jq -r '
            reduce .TransitGatewayAttachments[] as $a ({};
              . + {($a.TransitGatewayAttachmentId): {
                "name": ($a.Tags // [] | map(select(.Key=="Name")) | .[0].Value // $a.TransitGatewayAttachmentId),
                "type": $a.ResourceType,
                "account": $a.ResourceOwnerId,
                "state": $a.State,
                "subnet_tag": ($a.Tags // [] | map(select(.Key=="subnet")) | .[0].Value // "-")
              }}
            )' "$TMPDIR/tgw_attachments.json")

          # Generate content
          {
            ATT_COUNT=$(jq '.TransitGatewayAttachments | length' "$TMPDIR/tgw_attachments.json")
            RTB_COUNT=$(jq '.TransitGatewayRouteTables | length' "$TMPDIR/tgw_route_tables.json")
            echo "**Transit Gateway** \`${TGW_ID}\` — ${ATT_COUNT} attachments, ${RTB_COUNT} route tables"
            echo ""

            # Attachment summary
            echo "### Attachments"
            echo ""
            echo "| Name | Type | Account | Account Name | Subnet CIDR | State |"
            echo "|:-----|:-----|:--------|:-------------|:------------|:------|"
            jq -r --argjson acct_map "$ACCT_MAP" '
              .TransitGatewayAttachments | sort_by(.Tags // [] | map(select(.Key=="Name")) | .[0].Value // "") | .[] |
              "| " +
              ((.Tags // [] | map(select(.Key=="Name")) | .[0].Value) // .TransitGatewayAttachmentId) +
              " | " + .ResourceType +
              " | `" + .ResourceOwnerId + "`" +
              " | " + ($acct_map[.ResourceOwnerId] // "-") +
              " | " + ((.Tags // [] | map(select(.Key=="subnet")) | .[0].Value) // "-") +
              " | " + .State + " |"' "$TMPDIR/tgw_attachments.json"
            echo ""

            # Per route table: routes
            echo "### Route Tables"
            echo ""
            jq -r '.TransitGatewayRouteTables[] | .TransitGatewayRouteTableId' "$TMPDIR/tgw_route_tables.json" | while read -r RTB_ID; do
              RTB_NAME=$(jq -r --arg id "$RTB_ID" '
                .TransitGatewayRouteTables[] | select(.TransitGatewayRouteTableId==$id) |
                (.Tags // [] | map(select(.Key=="Name")) | .[0].Value) // $id' "$TMPDIR/tgw_route_tables.json")

              echo "#### ${RTB_NAME} (\`${RTB_ID}\`)"
              echo ""

              # Search routes (active + blackhole)
              ROUTES=$(aws ec2 search-transit-gateway-routes \
                --transit-gateway-route-table-id "$RTB_ID" \
                --filters "Name=state,Values=active,blackhole" \
                --output json 2>/dev/null || echo '{"Routes":[]}')

              ROUTE_COUNT=$(echo "$ROUTES" | jq '.Routes | length')
              if [ "$ROUTE_COUNT" -gt 0 ]; then
                echo "| Destination | Attachment | Type | Account Name | Subnet CIDR | State |"
                echo "|:------------|:-----------|:-----|:-------------|:------------|:------|"
                echo "$ROUTES" | jq -r --argjson att_map "$ATT_MAP" --argjson acct_map "$ACCT_MAP" '
                  .Routes | sort_by(.DestinationCidrBlock) | .[] |
                  (.TransitGatewayAttachments // [{}])[0] as $att |
                  ($att_map[$att.TransitGatewayAttachmentId] // {}) as $att_info |
                  "| " + .DestinationCidrBlock +
                  " | " + ($att_info.name // ($att.TransitGatewayAttachmentId // "-")) +
                  " | " + (.Type // "-") +
                  " | " + ($acct_map[$att_info.account // ""] // "-") +
                  " | " + ($att_info.subnet_tag // "-") +
                  " | " + .State + " |"'
              else
                echo "*No routes.*"
              fi
              echo ""
            done
          } > "$TMPDIR/tgw_content.txt"

          # --- Write complete file ---
          cat > "$TARGET" <<'FRONTMATTER'
          ---
          title: TGW Route Tables
          parent: Reference
          nav_order: 3
          domain: private
          ---

          # Transit Gateway Route Tables
          {: .no_toc }

          Auto-generated from EC2 API in the network account. Updated nightly.
          {: .fs-5 .fw-300 }

          ---

          FRONTMATTER

          {
            echo "<!-- BEGIN GENERATED CONTENT -->"
            cat "$TMPDIR/tgw_content.txt"
            echo "<!-- END GENERATED CONTENT -->"
            echo ""
            echo "---"
            echo ""
            echo "## Changelog"
            echo "<!-- BEGIN CHANGELOG -->"
            echo "<!-- END CHANGELOG -->"
          } >> "$TARGET"

          echo "✅ TGW route tables page generated"

