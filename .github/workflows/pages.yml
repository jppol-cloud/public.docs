name: Deploy Jekyll site to Pages ##

on:
  push:
    branches: ["main"]
    paths: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build the private/internal site
  build_private:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1.288.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0
          working-directory: '${{ github.workspace }}'
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site/

  # Deploy the private site to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_private
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  # Sync pages with 'domain: public' to the public.docs repo
  sync_public:
    runs-on: ubuntu-latest
    if: github.repository == 'jppol-cloud/private.docs'
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Authenticate with GitHub App
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        id: app-token
        with:
          app_id: 1201393
          private_key: ${{ secrets.DOCS_SYNC_PRIVATE_KEY }}

      - name: Clone Public Repo
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/jppol-cloud/public.docs.git public_repo

      - name: Sync Public Docs
        run: |
          # Get all files except .md files and specific directories
          find . -type f ! -name "*.md" \
            ! -path "./.git/*" \
            ! -path "./public_repo/*" > include_files.txt
          # Add .md files that contain 'domain: public'
          grep -rl 'domain: public' --include="*.md" . \
            | grep -vE '^\.\/(\. git|public_repo)' >> include_files.txt
          # Add files without metadata
          echo "./README.public.md" >> include_files.txt
          echo "./README.md" >> include_files.txt
          # Clean the public repo
          rm -rf public_repo/* public_repo/.github public_repo/.gitignore 2>/dev/null || true
          # Synchronize
          rsync -av --delete \
            --files-from=include_files.txt \
            ./ public_repo/

      - name: Commit and Push Changes
        run: |
          cd public_repo
          # Replace configs/index/readme with public versions
          mv _config.public.yml _config.yml
          mv README.public.md README.md
          mv index.public.md index.md
          # Set the public CNAME
          echo "docs.cloud.jppol.dk" > CNAME
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "Sync public docs - $(date)"
            git push origin main
          else
            echo "No changes to commit"
          fi
